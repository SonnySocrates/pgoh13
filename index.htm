<style>
    /* to have balloon text...Container for the paragraph */
    .paragraph-container {
      position: relative;
      max-width: 600px;
      margin: 50px auto;
      font-size: 18px;
      line-height: 1.5;
    }

    /* Tooltip styling */
    .tooltip {
      position: absolute;
      background-color: #333;
      color: #fff;
      padding: 10px;
      border-radius: 5px;
      font-size: 16px;
      max-width: 500px;
      z-index: 10;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      top: -100%;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    /* Show tooltip on hover */
    .paragraph-container:hover .tooltip {
      opacity: 1;
      visibility: visible;
    }

    /* Optional: Add a small triangle below the tooltip */
    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 8px;
      border-style: solid;
      border-color: #333 transparent transparent transparent;
    }
  </style>

  <!-- Javascript below for day and date and time is from Mistral -->
    <script>
        function afficherDateHeure() {
            const maintenant = new Date();

            // Noms des jours et des mois en français
            const jours = ["dimanche", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi"];
            const mois = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];

            // Récupération des informations
            const jourSemaine = jours[maintenant.getDay()];
            const jourMois = maintenant.getDate();
            const nomMois = mois[maintenant.getMonth()];
            const annee = maintenant.getFullYear();
            const heures = maintenant.getHours().toString().padStart(2, '0');
            const minutes = maintenant.getMinutes().toString().padStart(2, '0');

            // Affichage
            const dateHeure = `Nous sommes ${jourSemaine} ${jourMois} ${nomMois} ${annee}. Il est ${heures}h ${minutes}m`;
            document.getElementById("date-heure").textContent = dateHeure;
        }

        // Mise à jour toutes les minutes
        setInterval(afficherDateHeure, 1000);
    </script>
